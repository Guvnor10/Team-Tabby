server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://mealie:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter "</head>" "<script async src=\"http://localhost:3000/pixel.js\" data-ackee-server=\"http://localhost:3000\" data-ackee-domain-id=\"5f7f48f7-331d-4163-86c6-9b444942f9f5\" data-ackee-opts='{ \"ignoreOwnVisits\": false, \"ignoreLocalhost\": false }'></script></head>";
    }
}