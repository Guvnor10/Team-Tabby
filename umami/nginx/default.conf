server {
    listen 8080;

    location / {
        proxy_pass http://mealie:9000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Encoding "";

        sub_filter '</head>' '<script async defer src="http://localhost:3000/script.js" data-website-id="acdf92b4-5896-44fa-b483-84978bdddd75"></script></head>';

        sub_filter_once off;
        sub_filter_types *;
    }
}