worker_processes 1;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Log format
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log  /var/log/nginx/access.log  main;
  error_log   /var/log/nginx/error.log warn;

  sendfile on;

  # IMPORTANT: sub_filter won't work on gzipped responses
  gzip off;

  # Make sure we only try to inject into HTML
  sub_filter_types text/html;
  sub_filter_once off;

  server {
    listen 80;

    location / {
      proxy_pass http://mealie:9000;

      # Force upstream to send uncompressed so sub_filter can edit it
      proxy_set_header Accept-Encoding "";

      # Normal proxy headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Inject Matomo BEFORE </head>
      sub_filter '</head>' '<!-- Matomo --><script>
var _paq = window._paq = window._paq || [];
_paq.push(["enableLinkTracking"]);
_paq.push(["enableHeartBeatTimer"]);
_paq.push(["trackPageView"]);
(function() {
  var u="http://localhost:8080/";
  _paq.push(["setTrackerUrl", u+"matomo.php"]);
  _paq.push(["setSiteId", "1"]);
  var d=document, g=d.createElement("script"), s=d.getElementsByTagName("script")[0];
  g.async=true; g.src=u+"matomo.js"; s.parentNode.insertBefore(g,s);
})();
</script>
<script>
(function(){
  var last = location.href;
  setInterval(function(){
    if (location.href !== last){
      last = location.href;
      if (window._paq){
        _paq.push(["setCustomUrl", location.href]);
        _paq.push(["setDocumentTitle", document.title]);
        _paq.push(["trackPageView"]);
      }
    }
  }, 500);
})();
</script><!-- End Matomo Code --></head>';
    }
  }
}